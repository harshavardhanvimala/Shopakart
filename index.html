
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#064e3b" />
    <title>Shopakart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'sans-serif'],
            },
            colors: {
              primary: '#10b981', // emerald-500
              secondary: '#a3e635', // lime-400
              obsidian: '#09090b', // zinc-950
            },
            animation: {
              'logo-pop': 'logo-pop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
              'aura-pulse': 'aura-pulse 3s ease-in-out infinite',
              'tracking-reveal': 'tracking-reveal 2s ease-out forwards',
            }
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --android-safe-top: env(safe-area-inset-top, 0px);
        --android-safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      
      @keyframes logo-pop {
        0% { transform: scale(0.5) rotate(-15deg); opacity: 0; }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
      }
      
      @keyframes aura-pulse {
        0%, 100% { transform: scale(1); opacity: 0.3; filter: blur(40px); }
        50% { transform: scale(1.4); opacity: 0.5; filter: blur(60px); }
      }
      
      @keyframes tracking-reveal {
        0% { letter-spacing: -0.2em; opacity: 0; filter: blur(10px); }
        100% { letter-spacing: 0.6em; opacity: 1; filter: blur(0px); }
      }

      @keyframes shimmer-glide {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }

      .text-shimmer {
        background: linear-gradient(90deg, #10b981 0%, #ffffff 50%, #10b981 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer-glide 3s linear infinite;
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #f8fafc;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: contain;
        overflow: hidden;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      .dark body {
        background-color: #09090b; /* zinc-950 */
      }
      #root {
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .scroll-container {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding-top: var(--android-safe-top);
        padding-bottom: calc(120px + var(--android-safe-bottom));
        -webkit-overflow-scrolling: touch;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      
      /* Glassmorphism Classes */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .dark .glass {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .glass-dark {
        background: rgba(9, 9, 11, 0.85);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
