    <style>
      :root {
        --android-safe-top: env(safe-area-inset-top, 0px);
        --android-safe-bottom: env(safe-area-inset-bottom, 0px);
      }
      body {
        font-family: 'Roboto', 'Segoe UI', Tahoma, sans-serif;
        background-color: #ffffff;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: none;
        overflow: hidden;
      }
      /* Android Ripple Animation Simulation */
      .android-ripple {
        position: relative;
        overflow: hidden;
      }
      .android-ripple:active::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: rgba(0, 0, 0, 0.05);
        border-radius: inherit;
        pointer-events: none;
      }
      /* Edge-to-Edge Content Wrapper */
      #root {
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      .scroll-container {
        height: 100%;
        overflow-y: auto;
        padding-top: var(--android-safe-top);
        padding-bottom: calc(80px + var(--android-safe-bottom));
        -webkit-overflow-scrolling: touch;
      }
      ::-webkit-scrollbar { display: none; }
    </style>
